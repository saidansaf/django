{% extends 'app/base.html' %}

{% block content %}
<div class="card shadow p-4 text-center">

    <img src="{{ user.picture.url }}" class="rounded-circle mb-3" width="150" height="150" style="object-fit:cover;">

    <h3>{{ user.ism }} {{ user.familiya }}</h3>
    <p>Age: {{ user.yosh }}</p>

    <a href="{% url 'user_update' user.slug %}" class="btn btn-warning">Edit</a>
    <a href="{% url 'user_delete' user.id %}" class="btn btn-danger">Delete</a>

</div>
{% endblock %}

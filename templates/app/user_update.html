{% extends 'app/base.html' %}

{% block content %}
<div class="card p-4 shadow">
    <h3>Update User</h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input class="form-control mb-2" type="text" name="name" value="{{ user.name }}">
        <input class="form-control mb-2" type="text" name="surename" value="{{ user.surename }}">
        <input class="form-control mb-2" type="number" name="age" value="{{ user.age }}">

        <input class="form-control mb-3" type="file" name="picture">

        <button class="btn btn-warning">Update</button>
    </form>
</div>
{% endblock %}
